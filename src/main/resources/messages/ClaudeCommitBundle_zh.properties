# 中文（简体）资源包。IntelliJ 平台以 UTF-8 读取插件资源包，故此处直接使用中文。
# 带 {0}/{1} 的消息会经过 MessageFormat 处理，请勿使用裸的单引号。

# --- Action（平台按 action.<id>.text / .description 查找）---
action.ClaudeCommit.Generate.text=使用 Claude 生成提交消息
action.ClaudeCommit.Generate.description=使用 Claude CLI 根据当前改动生成提交消息
action.ClaudeCommit.CopyCcReference.text=复制 CC 引用
action.ClaudeCommit.CopyCcReference.description=复制当前文件与选区的 Claude Code 引用(@path#Lstart-end)
action.ClaudeCommit.SendCcReference.text=发送 CC 引用
action.ClaudeCommit.SendCcReference.description=将 Claude Code 引用(@path#Lstart-end)输入到当前终端标签页
# 生成进行中时按钮变为停止按钮所显示的文案
action.generate.stop=停止生成

# --- 进度 ---
progress.generating=正在调用 Claude 生成提交消息…

# --- 通知 ---
notify.generate.failed.title=生成提交消息失败
notify.noTerminal.title=没有可用的终端
notify.noTerminal.content=请先打开终端窗口(并启动会话)，再发送 CC 引用。
notify.send.failed.title=发送 CC 引用失败

# --- 生成失败原因 ---
error.noBasePath=无法确定项目根目录
error.noFiles=没有勾选任何已加入 Git 的文件
error.launchFailed=无法启动 claude 命令({0}): {1}
error.timeout=Claude 调用超时({0} 秒),可在设置中调整
error.exitCode=claude 退出码 {0}: {1}
error.noTag=Claude 输出中未找到 <commit-message> 标签。原始输出开头: {0}
error.emptyMessage=Claude 返回了空的提交消息

# --- 设置页 ---
settings.claudePath.label=Claude 命令:
settings.claudePath.comment=claude CLI 的命令名或绝对路径,例如 <code>claude</code> 或 <code>/usr/local/bin/claude</code>
settings.baseUrl.label=API 地址:
settings.baseUrl.comment=Anthropic 兼容 API 地址。留空使用 claude CLI 自身配置;使用第三方中转时填其地址
settings.apiKey.label=API Key:
settings.apiKey.comment=留空使用 claude CLI 已登录的凭据。保存到插件配置文件 claude-commit.xml
settings.model.label=模型:
settings.model.comment=例如 <code>claude-sonnet-5</code>。留空使用 claude CLI 默认模型
settings.timeout.label=超时(秒):
settings.terminal.group=终端(与提交消息生成无关)
settings.closeTerminalOnStartup.label=打开项目时自动关闭终端窗口
settings.closeTerminalOnStartup.comment=独立的便捷功能,与生成提交消息无关。从上次会话恢复的终端已没有实际会话,面板是空的;开启后打开项目时会自动关闭它。需要启用终端插件。
settings.language.label=提交消息语言:
settings.language.comment=生成的提交消息所用的语言。“跟随 IDE 语言”会根据 IDE 显示语言自动选择中文或英文。
settings.userPrompt.label=自定义提示词(追加在内置的提交消息约定之后):
settings.userPrompt.comment=内置提示词负责定义提交消息格式和输出约定,不可修改;这里的内容用于补充风格、语气等个性化要求

# --- 提交消息语言选项 ---
language.auto=跟随 IDE 语言
language.chinese=中文
language.english=英文
