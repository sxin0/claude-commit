# Default (fallback) bundle — English. Chinese lives in ClaudeCommitBundle_zh.properties.
# Loaded via com.github.claudecommit.ClaudeCommitBundle (DynamicBundle); the IDE
# display language selects the locale. Messages with {0}/{1} go through MessageFormat,
# so keep them free of stray single quotes.

# --- Actions (looked up by the platform as action.<id>.text / .description) ---
action.ClaudeCommit.Generate.text=Generate Commit Message with Claude
action.ClaudeCommit.Generate.description=Generate a commit message from the current changes using the Claude CLI
action.ClaudeCommit.CopyCcReference.text=Copy CC Reference
action.ClaudeCommit.CopyCcReference.description=Copy a Claude Code reference (@path#Lstart-end) for the current file and selection
action.ClaudeCommit.SendCcReference.text=Send CC Reference
action.ClaudeCommit.SendCcReference.description=Type a Claude Code reference (@path#Lstart-end) into the active terminal tab
# Dynamic label shown while a generation is running (the button becomes a stop button)
action.generate.stop=Stop Generating

# --- Progress ---
progress.generating=Calling Claude to generate the commit message…

# --- Notifications ---
notify.generate.failed.title=Failed to generate commit message
notify.noTerminal.title=No terminal available
notify.noTerminal.content=Open a terminal window (and start a session) first, then send the CC reference.
notify.send.failed.title=Failed to send CC reference

# --- Generation failure reasons ---
error.noBasePath=Cannot determine the project root directory
error.noFiles=No Git-tracked files are selected
error.launchFailed=Cannot start the claude command ({0}): {1}
error.timeout=Claude call timed out ({0} s); adjust it in settings
error.exitCode=claude exit code {0}: {1}
error.noTag=No <commit-message> tag found in Claude output. Output starts with: {0}
error.emptyMessage=Claude returned an empty commit message

# --- Settings page ---
settings.claudePath.label=Claude command:
settings.claudePath.comment=Command name or absolute path of the claude CLI, e.g. <code>claude</code> or <code>/usr/local/bin/claude</code>
settings.baseUrl.label=API URL:
settings.baseUrl.comment=Anthropic-compatible API URL. Leave empty to use the claude CLI's own configuration; set it when using a third-party relay.
settings.apiKey.label=API Key:
settings.apiKey.comment=Leave empty to use the credentials the claude CLI is already logged in with. Saved to the plugin config file claude-commit.xml.
settings.model.label=Model:
settings.model.comment=e.g. <code>claude-sonnet-5</code>. Leave empty to use the claude CLI default model.
settings.timeout.label=Timeout (seconds):
settings.terminal.group=Terminal (independent of commit-message generation)
settings.closeTerminalOnStartup.label=Close the Terminal tool window when a project opens
settings.closeTerminalOnStartup.comment=Standalone convenience option — has nothing to do with generating commit messages. A terminal restored from the previous session has no live shell, so the panel is empty; enable this to keep it closed on open. Requires the Terminal plugin.
settings.language.label=Commit message language:
settings.language.comment=Language of the generated commit message. "Follow IDE language" picks Chinese or English based on the IDE display language.
settings.userPrompt.label=Custom prompt (appended after the built-in commit conventions):
settings.userPrompt.comment=The built-in prompt defines the commit message format and output contract and cannot be changed; this content adds personalization such as style and tone.

# --- Commit message language options ---
language.auto=Follow IDE language
language.chinese=Chinese
language.english=English
